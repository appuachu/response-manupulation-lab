<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification | SecureAuth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f0e17;
            min-height: 100vh;
            color: #fffffe;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .bg-animation .circle:nth-child(1) {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, #6246ea, #ec4899);
            top: -10%;
            right: -5%;
            animation-delay: 0s;
        }

        .bg-animation .circle:nth-child(2) {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            bottom: -10%;
            left: -5%;
            animation-delay: -5s;
        }

        .bg-animation .circle:nth-child(3) {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #ec4899, #f59e0b);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(20px, 30px) scale(1.05); }
        }

        /* Glass Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 14, 23, 0.6);
            backdrop-filter: blur(2px);
            z-index: 1;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 30px;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header / Navbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.6rem;
            color: #fffffe;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #6246ea, #ec4899);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            box-shadow: 0 8px 30px rgba(98, 70, 234, 0.3);
        }

        .logo span {
            background: linear-gradient(135deg, #6246ea, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: #fffffe;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #6246ea, #ec4899);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            background: linear-gradient(135deg, #6246ea, #ec4899);
            padding: 10px 24px;
            border-radius: 10px;
            color: white !important;
            font-weight: 600 !important;
            box-shadow: 0 8px 25px rgba(98, 70, 234, 0.25);
            transition: all 0.3s ease !important;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(98, 70, 234, 0.35);
            color: white !important;
        }

        .nav-cta::after {
            display: none !important;
        }

        /* Auth Container */
        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header .icon-wrapper {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.2), rgba(16, 185, 129, 0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 1.8rem;
            color: #34d399;
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .auth-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fffffe;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
        }

        /* Flash Messages */
        .flash-container {
            margin-bottom: 24px;
        }

        .flash-message {
            padding: 14px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .flash-message.success {
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.2);
            color: #6ee7b7;
        }

        .flash-message.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .flash-message .flash-icon {
            font-size: 1.2rem;
        }

        /* Security Notice */
        .security-notice {
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.15);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .security-notice .notice-icon {
            font-size: 1.2rem;
            color: #fbbf24;
            flex-shrink: 0;
        }

        .security-notice .notice-text {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .security-notice .notice-text strong {
            color: #fcd34d;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .form-group label i {
            margin-right: 8px;
            color: rgba(255, 255, 255, 0.3);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fffffe;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: rgba(98, 70, 234, 0.4);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 4px rgba(98, 70, 234, 0.05);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-control.otp-input {
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 8px;
            font-weight: 600;
            padding: 14px 16px;
        }

        .form-control.otp-input:focus {
            letter-spacing: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #6246ea, #ec4899);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(98, 70, 234, 0.25);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(98, 70, 234, 0.35);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn i {
            font-size: 1rem;
        }

        /* Message */
        #message {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 12px;
            display: none;
            font-weight: 500;
            font-size: 0.9rem;
            animation: fadeIn 0.4s ease-out;
        }

        #message.success {
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.2);
            color: #6ee7b7;
        }

        #message.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        /* Loading */
        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .loading .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #a78bfa;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p {
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }

        /* Auth Links */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .auth-footer a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .auth-footer a:hover {
            color: #a78bfa;
        }

        .auth-footer .separator {
            color: rgba(255, 255, 255, 0.15);
            margin: 0 12px;
        }

        /* Footer */
        footer {
            padding: 24px 0 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        .footer-copy {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 16px 20px;
            }

            header {
                flex-direction: column;
                align-items: stretch;
                gap: 16px;
            }

            .logo {
                justify-content: center;
            }

            .nav-links {
                justify-content: center;
                flex-wrap: wrap;
                gap: 16px;
            }

            .nav-links a {
                font-size: 0.85rem;
            }

            .auth-card {
                padding: 32px 24px;
                border-radius: 16px;
            }

            .auth-header h2 {
                font-size: 1.5rem;
            }

            footer {
                flex-direction: column;
                text-align: center;
                gap: 12px;
            }

            .footer-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 24px 16px;
            }

            .auth-header .icon-wrapper {
                width: 52px;
                height: 52px;
                font-size: 1.4rem;
            }

            .form-control {
                padding: 12px 14px 12px 38px;
                font-size: 0.95rem;
            }

            .form-control.otp-input {
                font-size: 1rem;
                letter-spacing: 4px;
                padding: 12px 14px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 0.95rem;
            }

            .security-notice {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    <div class="overlay"></div>

    <div class="container">
        <!-- Header -->
        <header>
            <a href="/" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <span>SecureAuth</span>
            </a>
            <div class="nav-links">
                <a href="#">Features</a>
                <a href="#">Pricing</a>
                <a href="#">Docs</a>
                <a href="#">Contact</a>
                <a href="/login" class="nav-cta">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </a>
            </div>
        </header>

        <!-- Auth Section -->
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="icon-wrapper">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <h2>OTP Verification</h2>
                    <p>Enter the OTP sent to your email</p>
                </div>

                <!-- Flash Messages -->
                <div class="flash-container" id="flashContainer">
                    <!-- Flash messages will appear here -->
                </div>

                <!-- Security Notice -->
                <div class="security-notice">
                    <span class="notice-icon"><i class="fas fa-info-circle"></i></span>
                    <div class="notice-text">
                        <strong>Note:</strong> Check your Email for OTP
                    </div>
                </div>

                <!-- Form -->
                <form id="otpForm">
                    <div class="form-group">
                        <label for="otp"><i class="fas fa-key"></i> Enter OTP</label>
                        <div class="input-wrapper">
                            <span class="input-icon"><i class="fas fa-hashtag"></i></span>
                            <input type="text" id="otp" name="otp" class="form-control otp-input" required placeholder="• • • •" maxlength="4">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="new_password"><i class="fas fa-lock"></i> New Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="new_password" name="new_password" class="form-control" required placeholder="Enter new password (min 6 chars)">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn">
                        <i class="fas fa-check-circle"></i> Verify OTP
                    </button>
                </form>

                <div id="message"></div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Verifying and redirecting...</p>
                </div>

                <div class="auth-footer">
                    <a href="{{ url_for('forget') }}">
                        <i class="fas fa-arrow-left"></i> Back to Recovery
                    </a>
                    <span class="separator">|</span>
                    <a href="{{ url_for('login_page') }}">
                        <i class="fas fa-sign-in-alt"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Security</a>
            </div>
            <div class="footer-copy">
                &copy; 2026 SecureAuth. All rights reserved.
            </div>
        </footer>
    </div>

    <script>
        document.getElementById('otpForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const messageDiv = document.getElementById('message');
            const loadingDiv = document.getElementById('loading');
            const submitBtn = document.getElementById('submitBtn');
            const flashContainer = document.getElementById('flashContainer');

            // Clear previous messages
            messageDiv.style.display = 'none';
            messageDiv.className = '';
            flashContainer.innerHTML = '';

            // Disable button during request
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

            fetch('/otp', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                messageDiv.style.display = 'block';

                // VULNERABILITY: Client-side trusts the 'value' field
                // Attacker can intercept and change 'value' from false to true
                if (data.value === true) {
                    // SUCCESS - Redirect to dashboard-access endpoint
                    messageDiv.className = 'success';
                    messageDiv.innerHTML = '✅ ' + data.message;
                    loadingDiv.style.display = 'block';

                    console.log('[+] OTP Verified! Redirecting to dashboard...');
                    console.log('[+] Response data:', data);

                    // Redirect to dashboard-access (bypasses login_required)
                    setTimeout(() => {
                        window.location.href = '/dashboard-access';
                    }, 1500);

                } else {
                    // ERROR - Show error message
                    messageDiv.className = 'error';
                    messageDiv.innerHTML = '❌ ' + data.message;

                    // Re-enable button
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Verify OTP';
                    loadingDiv.style.display = 'none';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                messageDiv.className = 'error';
                messageDiv.innerHTML = '❌ An error occurred. Please try again.';
                messageDiv.style.display = 'block';

                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Verify OTP';
                loadingDiv.style.display = 'none';
            });
        });

        // Auto-dismiss flash messages
        document.addEventListener('DOMContentLoaded', function() {
            const flashMessages = document.querySelectorAll('.flash-message');
            flashMessages.forEach(function(msg) {
                setTimeout(function() {
                    msg.style.opacity = '0';
                    msg.style.transform = 'translateX(20px)';
                    msg.style.transition = 'all 0.5s ease';
                    setTimeout(function() {
                        msg.remove();
                    }, 500);
                }, 5000);
            });
        });
    </script>
</body>
</html>
